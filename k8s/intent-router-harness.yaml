apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-router-harness
  namespace: intent
  labels:
    app: intent-router-harness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intent-router-harness
  template:
    metadata:
      labels:
        app: intent-router-harness
    spec:
      initContainers:
        - name: prepare-app
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              python -m pip install --no-cache-dir --target /deps \
                "fastapi>=0.115" \
                "pydantic>=2.0" \
                "pydantic-settings>=2.0" \
                "uvicorn[standard]>=0.30"
              mkdir -p /work/app
              tar -xzf /mounted-code/app.tar.gz -C /work/app
          volumeMounts:
            - name: app-code
              mountPath: /mounted-code
              readOnly: true
            - name: app-work
              mountPath: /work
            - name: python-deps
              mountPath: /deps
      containers:
        - name: service
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - uvicorn
            - intent_router_harness.asgi:app
            - --factory
            - --host
            - 0.0.0.0
            - --port
            - "8765"
            - --no-access-log
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: PYTHONPATH
              value: /deps:/work/app/src
            - name: INTENT_ROUTER_HARNESS_SPEC_PATH
              value: /work/app/examples/finance-router-harness.toml
            - name: INTENT_ROUTER_HARNESS_REGRESSION_SUITE_PATH
              value: /work/app/regressions/assistant_protocol_v0_5.json
            - name: INTENT_ROUTER_HARNESS_LLM_ENV_FILE
              value: /mounted-secrets/.env.local
            - name: INTENT_ROUTER_HARNESS_LOG_LEVEL
              value: INFO
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: app-work
              mountPath: /work
              readOnly: true
            - name: python-deps
              mountPath: /deps
              readOnly: true
            - name: app-secrets
              mountPath: /mounted-secrets
              readOnly: true
      volumes:
        - name: app-code
          configMap:
            name: intent-router-harness-code
        - name: app-secrets
          secret:
            secretName: intent-router-harness-env
            optional: true
        - name: app-work
          emptyDir: {}
        - name: python-deps
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: intent-router-harness
  namespace: intent
  labels:
    app: intent-router-harness
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  type: ClusterIP
  selector:
    app: intent-router-harness
  ports:
    - name: http
      port: 8765
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intent-router-harness
  namespace: intent
  labels:
    app: intent-router-harness
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: ai.intent-router.cc
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intent-router-harness
                port:
                  name: http
