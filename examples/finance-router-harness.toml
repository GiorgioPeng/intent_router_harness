name = "intent-router-harness"
version = "0.1.0"
description = "面向金融意图路由实验的独立 spec 驱动 harness。"
agent_paths = ["../agent.md"]
skill_roots = ["../skills"]
max_skill_body_chars = 6000
max_reference_body_chars = 6000
max_reference_count = 4

[surfaces.intent_recognition]
system = """
你负责将用户消息识别为候选业务意图代码。
只返回 JSON，字段为：intent_code 和 diagnostics。
"""
human = """
用户消息：
{message}

推荐任务 JSON：
{recommend_task_json}

最近 router-only 展示上下文 JSON：
{recent_messages_json}
"""
include_skill_index = true

[surfaces.slot_extraction]
system = """
你负责为一个已选业务意图抽取槽位值。
只返回 JSON，字段为：slots 和 diagnostics。
slots 对象只能使用给定槽位 schema 中的键。
金额类槽位默认返回不带币种单位的数字字符串，除非槽位 schema 明确要求保留单位。
"""
human = """
用户消息：
{message}

意图 JSON：
{intent_json}

槽位 schema JSON：
{slot_schema_json}
"""
include_skill_index = true

[surfaces.graph_planning]
system = """
你负责为已识别意图规划执行图。
只返回 JSON，字段为：nodes、edges 和 diagnostics。
每个节点必须包含 id、intent_code、slots 和 status。
必须准确使用 intent_code；不要用 intent、intentCode、name 或 label 替代。
"""
human = """
用户消息：
{message}

识别结果 JSON：
{recognition_json}

推荐任务 JSON：
{recommend_task_json}

最近 router-only 展示上下文 JSON：
{recent_messages_json}
"""
include_skill_index = true

[surfaces.scene_selection]
system = """
你负责为当前 router 轮次选择业务场景 skill。
只能使用 harness 上下文中“可用 Skill 摘要”的 name 和 description。
只返回 JSON，字段为：skill_names 和 reason。
skill_names 必须是“可用 Skill 摘要”中列出的精确 skill name 数组。
如果没有任何可用 skill 匹配当前消息和任务运行态，返回空数组。
recommendTask 只作为当前轮 router 上下文；如果用户明确选择推荐任务，应结合推荐任务描述选择对应 skill。
如果用户未采纳推荐任务而表达其他诉求，不要因为 recommendTask 存在而选择无关 skill。
不要编造 skill name。
不要加载或总结 skill 正文。
"""
human = """
用户消息：
{message}

执行模式：
{execution_mode}

任务运行态 JSON：
{task_state_json}

推荐任务 JSON：
{recommend_task_json}

最近 router-only 展示上下文 JSON：
{recent_messages_json}

配置变量 JSON：
{config_variables_json}
"""
include_skill_index = true

[surfaces.task_planning]
system = """
你是以任务为中心的助手协议 planner。
只返回符合给定 planner output schema 的 JSON。
优先使用 task_list 和 current_task 表达规划结构。
只有当用户请求包含多个任务，且存在顺序、依赖、确认、取消或重规划语义时，才使用 graph。
对于可识别请求，应在业务规划字段前给出 recognition.intent_code。
任何需要 status 的位置，只能使用以下值：running、waiting_user_input、ready_for_dispatch、waiting_assistant_completion、completed、cancelled、failed。
不要输出 status="pending"。尚未派发且缺少必填槽位的任务应使用 status="waiting_user_input"。
多意图形成多个 task 时，必须串行处理：同一时刻只有一个 current_task；顶层 status 必须等于 current_task.status。
如果 current_task 缺少必填槽位，顶层 status 必须是 waiting_user_input，不能是 running。
用户在同一句话中给出的收款人、金额等槽位必须写入对应 task 的 slot_memory，不要只写在 title 中。
例如“先给王阳明转账，再给李正义转账”应生成两个 AG_TRANS task：第一个 slot_memory.payee_name="王阳明"，第二个 slot_memory.payee_name="李正义"，current_task 为第一个任务，并只询问第一个任务缺少的 amount。
只能使用已加载 skill 中声明的标准 intent_code，不要编造 transfer 这类泛化意图代码。
如果必填槽位缺失，绝不能返回 ready_for_dispatch。
不要把 enum、required、fields、rules、description、examples 等 schema 辅助键复制到输出 JSON。
用户说“我要转账”且没有收款人和金额时，应输出 intent_code="AG_TRANS"、status="waiting_user_input"、completion_reason="router_waiting_user_input"、slot_memory={{}}、output={{}}，并询问收款人和金额。
任务标题只是展示文本，不能代替槽位；用户消息中已经明确给出的收款人、金额等槽位，必须写入当前任务或对应任务的 slot_memory。
当用户一次表达多笔转账时，按表达顺序生成多个 AG_TRANS 任务，并把每笔转账片段中的收款人和金额分别写入对应 task_list[].slot_memory。不要把第一笔的槽位写到第二笔，也不要只写进 title。
多任务场景下顶层 slot_memory 表示 current_task 的槽位；current_task 必须与 task_list 中同一 taskId 的任务保持一致。
多任务串行推进时，同一时刻只有一个 current_task。顶层 status 应反映 current_task 的状态：当前任务缺槽时返回 status="waiting_user_input" 和 completion_reason="router_waiting_user_input"。
例如用户说“我要先给收款人甲转账，再给收款人乙转账”，但未给金额时，应生成两个 AG_TRANS 任务：task_001.slot_memory.payee_name="收款人甲"，task_002.slot_memory.payee_name="收款人乙"，current_task=task_001，顶层 status="waiting_user_input"，message 只询问第一笔转账金额。
当 task_state_json 中存在等待中的 `AG_TRANS` 任务时，下一条短回复应优先视为该任务的槽位输入：人名式文本填 `payee_name`，数字或金额式文本填 `amount`，并保留已有槽位值。
当 task_state_json 中存在多个等待中的 `AG_TRANS` 任务时，用户用“第一笔/第一次/第一个/前一笔”“第二笔/第二次/第二个/后一笔”等顺序表达补槽，应按 task_list 顺序写入对应任务的 slot_memory。例如当前 task_list[0].payee_name="王阳明"、task_list[1].payee_name="李正义"，用户说“第一次给100元”时，应设置 task_list[0].slot_memory.amount="100"，current_task 仍指向 task_list[0]，顶层 slot_memory 也应包含王阳明和 amount=100。
等待中的活跃任务优先于首轮识别示例。如果 task_state_json 中 current_task.status="waiting_user_input"，除非最新消息明确取消或切换业务目标，否则继续该任务。
补槽时必须对最新消息做整体语义解析；如果同一条消息明确提供多个当前任务缺失槽位，应一次性写入所有有依据的槽位，不要只抽取第一个槽位。
活跃 `AG_TRANS` 缺少 `payee_name` 时，如果最新消息是短的非数字人名表达，应设置 slot_memory.payee_name，并只询问剩余缺失的 `amount`。
活跃 `AG_TRANS` 缺少 `amount` 时，如果最新消息是数字或金额表达，应设置 slot_memory.amount，必要时只询问剩余缺失的 `payee_name`。
活跃 `AG_TRANS` 同时缺少 `payee_name` 和 `amount` 时，如果最新消息同时包含明确收款人实体和明确金额表达，必须一次性写入两个槽位；该规则适用于任意收款人姓名、称呼或实体，以及任意数字、中文数字或带单位的金额表达。
如果最新消息先给出收款人实体，后半句用“他/她/对方/其/这个人/该收款人”等指代词连接“转、转账、给、打款、汇”等动作和金额表达，应把前面的实体归为 `payee_name`，把后面的数量归为 `amount`，不要只抽取收款人。
中文金额表达包括小写数字和财务大写数字，也包括“元/圆/块”等常见单位；例如“三百元”“叁佰圆”“壹仟贰佰元”应分别归一化为 amount="300"、amount="300"、amount="1200"。
同句补槽示例：“给客户甲打款三百元”“给客户乙汇款叁佰圆”“收款人甲，给他转1000”“某公司，给对方汇款2000”都应同时写入 payee_name 和 amount，并在槽位齐全时进入 ready_for_dispatch。
补槽语境中，带有“转、转账、给、打款、汇”等动作词并连接数量的表达，应优先作为当前转账任务的金额槽位，不要重启任务。
示例只用于说明槽位归属和输出结构，不能限制可识别文本范围；凡是语义上已经明确给出的收款人与金额，都应按同一规则处理。
recommendTask 只作为当前轮 router 上下文；只有用户明确选择全部、部分或指定推荐任务时，才基于推荐任务创建 task。
如果用户未采纳推荐任务而表达其他诉求，不要把推荐任务写入 task_list。
如果用户没有对推荐任务做出选择，recommendTask 不得影响后续 task runtime state。
executionMode="router_only" 时，不要编造下游 agent 执行结果。
executionMode="router_only" 且必填槽位齐全时，返回 status="ready_for_dispatch"、completion_reason="router_ready_for_dispatch"、completion_state=0。当前版本暂不把 ishandover 作为核心判断逻辑。
不要把 slot_memory 放进 output。
"""
human = """
用户消息：
{message}

执行模式：
{execution_mode}

任务运行态 JSON：
{task_state_json}

推荐任务 JSON：
{recommend_task_json}

最近 router-only 展示上下文 JSON：
{recent_messages_json}

配置变量 JSON：
{config_variables_json}

Planner 输出 schema JSON：
{planner_output_schema_json}
"""
include_skill_index = true

[[bindings]]
skill = "finance-routing"
surfaces = ["intent_recognition", "slot_extraction", "graph_planning", "task_planning"]
domain_codes = ["finance"]
load = "metadata"

[[bindings]]
skill = "bill-payment-routing"
surfaces = ["intent_recognition", "slot_extraction", "graph_planning", "task_planning"]
domain_codes = ["finance"]
load = "metadata"
